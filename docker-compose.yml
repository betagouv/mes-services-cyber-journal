version: '3'

services:
  msc-journal-db:
    image: docker.io/postgres
    environment:
      - POSTGRES_HOST_AUTH_METHOD=trust
    networks:
      - msc-network
    ports:
      - "5433:5432"
    volumes:
      - /var/lib/postgresql/data

  metabase:
    image: docker.io/metabase/metabase:v0.51.3
    environment:
      - MB_DB_TYPE=postgres
      - MB_DB_DBNAME=msc-journal
      - MB_DB_PORT=5432
      - MB_DB_USER=postgres
      - MB_DB_PASS=postgres
      - MB_DB_HOST=msc-journal-db
    networks:
      - msc-network
    ports:
      - "3001:3000"
    depends_on:
      - msc-journal-db

  node:
    image: docker.io/node:${NODE_VERSION:-latest}
    volumes:
      - ./:/home/node/app
    working_dir: /home/node/app
    command: "./scripts/migrations.sh"
    networks:
      - msc-network
    depends_on:
      - msc-journal-db

networks:
  msc-network:
    external: true
